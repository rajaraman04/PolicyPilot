  question: "Define the following terms: validation, reliability, accuracy, and generalizability."
  category: single_doc
  expected_behavior: answerable
  expected_source_docs: ["nist_ai_rmf.pdf"]
  expected_answer_contains: ["objective evidence", "without failure", "closeness", "variety of circumstances"]
