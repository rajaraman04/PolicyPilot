# PolicyPilot evaluation gold set
# =================================
# SCHEMA (top level is a list of question entries):
#   id                        (str, required, unique)  Stable identifier, e.g. "q001".
#   question                  (str, required)          The question to ask the system.
#   category                  (str, required)          single_doc | multi_doc | no_evidence
#                                                      | ambiguous | adversarial_injection
#   expected_behavior         (str, required)          answerable | not_supported
#                                                      | needs_more_info | must_ignore_injection
#   expected_source_docs      (list[str])              Filenames that SHOULD be retrieved.
#                                                      Required for answerable; empty otherwise.
#   expected_answer_contains  (list[str])              Terms a correct answer should contain.
#                                                      Empty for not_supported / needs_more_info.
#   notes                     (str, optional)          Labeling rationale.
#
# Rules enforced by the loader (eval/gold_set.py):
#   - ids unique; single_doc => exactly 1 source; multi_doc => >= 2 sources
#   - not_supported / needs_more_info => sources AND expected_answer_contains both empty
#   - no "<verify" placeholders may remain in expected_answer_contains
#
# All expected_answer_contains below were VERIFIED against the ingested chunks
# (see notes for page numbers), not written from memory.

